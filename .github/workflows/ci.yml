name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          ADMIN_PASSWORD: ci-placeholder
          ADMIN_SECRET: ci-placeholder-secret-do-not-use-in-prod
